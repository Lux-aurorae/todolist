<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <!-- ★ 반응형의 자격증: 폰 화면 크기에 맞춰 보여달라는 선언 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>할일 리스트</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>할일 리스트</h1>

    <!-- ① 입력창 + 추가 버튼 -->
    <input type="text" id="task-input" placeholder="할일 입력" />
    <button id="add-button">+</button>

    <!-- ② 탭 3개 + 언더바 -->
    <div id="tab-menu">
      <button class="tab" id="tab-all">전체</button>
      <button class="tab" id="tab-ing">진행중</button>
      <button class="tab" id="tab-done">완료</button>
      <div id="under-bar"></div>
    </div>

    <!-- ③ 할일이 JS로 그려지는 곳 -->
    <div id="task-board"></div>

    <script src="script.js"></script>
  </body>
</html>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="main.js"></script>     
</body>
</html>
